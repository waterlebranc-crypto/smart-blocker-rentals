<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentConnect Uganda</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#f5f5f5;
}

/* HEADER */
header{
  background:#111827;
  color:white;
  padding:15px 5%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:28px;
  font-weight:700;
  color:#ff9900;
}

header button{
  background:#ff9900;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
}

/* HERO */
.hero{
  height:450px;
  background:
  linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
  url('https://images.unsplash.com/photo-1560185007-c5ca9d2c014d?q=80&w=1200&auto=format&fit=crop');
  background-size:cover;
  background-position:center;

  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  padding:20px;
}

.hero h1{
  font-size:50px;
}

.hero p{
  margin-top:10px;
  font-size:18px;
}

/* SEARCH */
.search-box{
  margin-top:25px;
  background:white;
  padding:15px;
  border-radius:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.search-box input{
  padding:12px;
  width:220px;
  border:1px solid #ddd;
  border-radius:8px;
}

.search-box button{
  background:#ff9900;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:8px;
  cursor:pointer;
}

/* SECTION */
.section{
  padding:50px 5%;
}

.section h2{
  margin-bottom:25px;
  font-size:32px;
}

/* PROPERTIES */
.properties{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:25px;
}

.property-card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.property-card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.property-content{
  padding:15px;
}

.price{
  color:green;
  font-size:24px;
  font-weight:bold;
}

.location{
  color:#666;
  margin:8px 0;
}

.badge{
  display:inline-block;
  background:#e0f2fe;
  color:#0369a1;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  margin-top:10px;
}

.contact-btn{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  background:#111827;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* FORM */
.form-container{
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.form-container input,
.form-container textarea,
.form-container select{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:8px;
}

.form-container textarea{
  height:120px;
  margin-top:15px;
}

.post-btn{
  width:100%;
  padding:14px;
  background:#ff9900;
  color:white;
  border:none;
  border-radius:8px;
  margin-top:15px;
  cursor:pointer;
  font-size:16px;
  font-weight:600;
}

/* LOGIN MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content{
  background:white;
  width:90%;
  max-width:400px;
  padding:25px;
  border-radius:12px;
}

.modal-content h2{
  margin-bottom:15px;
}

.modal-content input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:1px solid #ddd;
  border-radius:8px;
}

.modal-content button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.create-btn{
  background:#ff9900;
  color:white;
}

.close-btn{
  background:#111827;
  color:white;
}

.success{
  text-align:center;
  color:green;
  margin-top:10px;
}

footer{
  background:#111827;
  color:white;
  text-align:center;
  padding:25px;
  margin-top:40px;
}

/* RESPONSIVE */
@media(max-width:768px){

.hero h1{
  font-size:35px;
}

.form-grid{
  grid-template-columns:1fr;
}

.search-box{
  flex-direction:column;
}

.search-box input,
.search-box button{
  width:100%;
}

}

</style>
</head>

<body>

<!-- LOGIN MODAL -->
<div class="modal" id="modal">

<div class="modal-content">

<h2>🏠 Landlord Account</h2>

<input type="text" id="fullname" placeholder="Full Name">
<input type="email" id="email" placeholder="Email Address">
<input type="tel" id="phone" placeholder="Phone Number">
<input type="password" id="password" placeholder="Password">

<button class="create-btn" onclick="registerLandlord()">Create Account</button>

<button class="close-btn" onclick="closeModal()">Close</button>

<p class="success" id="success"></p>

</div>
</div>

<!-- HEADER -->
<header>

<div class="logo">SMART BLOCKER</div>

<button onclick="openModal()">Landlord Login</button>

</header>

<!-- HERO -->
<section class="hero">

<div>

<h1>Find Your Perfect Rental Home</h1>

<p>YOUR SMART BLOCKER</p>

<div class="search-box">

<input type="text" id="searchInput" placeholder="Search Location">

<button onclick="searchProperty()">Search Property</button>

</div>

</div>

</section>

<!-- PROPERTIES -->
<section class="section">

<h2>Featured Properties</h2>

<div class="properties" id="propertyList">

<!-- SAMPLE PROPERTY -->
<div class="property-card">

<img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?q=80&w=1200&auto=format&fit=crop">

<div class="property-content">

<div class="price">UGX 850,000</div>

<h3>Modern Apartment</h3>

<p class="location">📍 Ntinda, Kampala</p>

<span class="badge">2 Bedrooms</span>

<button class="contact-btn"
onclick="contactLandlord('0771234567')">
Contact Landlord
</button>

</div>

</div>

</div>

</section>

<!-- POST PROPERTY -->
<section class="section">

<h2>Post Your Property</h2>

<div class="form-container">

<div class="form-grid">

<input type="text" id="title" placeholder="Property Title">

<input type="text" id="location" placeholder="Location">

<input type="number" id="price" placeholder="Price">

<input type="tel" id="landlordPhone" placeholder="Landlord Phone Number">

<select id="type">
<option>Apartment</option>
<option>Single Room</option>
<option>Studio</option>
<option>House</option>
</select>

</div>

<textarea id="description" placeholder="Describe your property"></textarea>

<input type="file" id="imageUpload" accept="image/*">

<button class="post-btn" onclick="postProperty()">Publish Property</button>

</div>

</section>

<footer>

<p>© 2026 RentConnect Uganda. All Rights Reserved.</p>

</footer>

<script>

/* MODAL */
function openModal(){
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* REGISTER */
function registerLandlord(){

  let fullname=document.getElementById("fullname").value;
  let email=document.getElementById("email").value;
  let phone=document.getElementById("phone").value;
  let password=document.getElementById("password").value;

  if(!fullname || !email || !phone || !password){
    alert("Fill all fields");
    return;
  }

  let landlords=JSON.parse(localStorage.getItem("landlords")) || [];

  landlords.push({
    fullname,
    email,
    phone,
    password
  });

  localStorage.setItem("landlords",JSON.stringify(landlords));

  document.getElementById("success").innerHTML=
  "✔ Account Created Successfully";

}

/* CONTACT LANDLORD */
function contactLandlord(phone){

  let choice=confirm(
    "Press OK to Call Landlord or Cancel for WhatsApp"
  );

  if(choice){

    window.location.href="tel:"+phone;

  }else{

    window.open(
      "https://wa.me/256"+phone.substring(1),
      "_blank"
    );

  }

}

/* POST PROPERTY */
function postProperty(){

  let title=document.getElementById("title").value;
  let location=document.getElementById("location").value;
  let price=document.getElementById("price").value;
  let phone=document.getElementById("landlordPhone").value;
  let type=document.getElementById("type").value;
  let description=document.getElementById("description").value;

  let imageInput=document.getElementById("imageUpload");

  if(!title || !location || !price || !description || !phone){
    alert("Please fill all fields");
    return;
  }

  let imageURL="https://images.unsplash.com/photo-1484154218962-a197022b5858?q=80&w=1200&auto=format&fit=crop";

  if(imageInput.files[0]){
    imageURL=URL.createObjectURL(imageInput.files[0]);
  }

  let card=document.createElement("div");

  card.className="property-card";

  card.innerHTML=`

  <img src="${imageURL}">

  <div class="property-content">

  <div class="price">UGX ${price}</div>

  <h3>${title}</h3>

  <p class="location">📍 ${location}</p>

  <span class="badge">${type}</span>

  <p style="margin-top:10px;">${description}</p>

  <button class="contact-btn"
  onclick="contactLandlord('${phone}')">
  Contact Landlord
  </button>

  </div>

  `;

  document.getElementById("propertyList").appendChild(card);

  document.getElementById("title").value="";
  document.getElementById("location").value="";
  document.getElementById("price").value="";
  document.getElementById("landlordPhone").value="";
  document.getElementById("description").value="";
  document.getElementById("imageUpload").value="";

  alert("✔ Property Published Successfully");

}

/* SEARCH */
function searchProperty(){

  let input=document.getElementById("searchInput").value.toLowerCase();

  let properties=document.getElementsByClassName("property-card");

  for(let i=0;i<properties.length;i++){

    let text=properties[i].innerText.toLowerCase();

    if(text.includes(input)){
      properties[i].style.display="block";
    }else{
      properties[i].style.display="none";
    }

  }

}

</script>

</body>
</html>
